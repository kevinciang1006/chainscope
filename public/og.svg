<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="1200" height="630" fill="#FAFAF7"/>

  <!-- Subtle inner frame -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#E8E6DE" stroke-width="1" rx="16"/>

  <!-- Decorative gradient stripe along the left -->
  <rect x="40" y="40" width="6" height="550" fill="#1F5C4E" rx="3"/>

  <!-- Logo + wordmark -->
  <g transform="translate(96 100)">
    <g stroke="#1F5C4E" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="scale(1.5)">
      <rect x="4" y="14" width="11" height="6" rx="3"/>
      <path d="M21 6c4 0 7 3 7 7s-3 7-7 7"/>
      <path d="M28 13c-3 0-6 2-7 5"/>
      <line x1="14" y1="17" x2="22" y2="13"/>
    </g>
    <text x="64" y="34" font-size="32" font-weight="600" letter-spacing="-0.5" fill="#1A1A17">ChainScope</text>
  </g>

  <!-- Eyebrow -->
  <text x="96" y="240" font-size="18" font-weight="500" fill="#8A8A82" letter-spacing="3">PORTFOLIO DEMO</text>

  <!-- Headline -->
  <text x="96" y="310" font-size="68" font-weight="600" fill="#1A1A17" letter-spacing="-1.5">Supply Chain ESG</text>
  <text x="96" y="384" font-size="68" font-weight="600" fill="#1A1A17" letter-spacing="-1.5">Intelligence</text>

  <!-- Subhead -->
  <text x="96" y="448" font-size="26" font-weight="400" fill="#4A4A45">Supplier risk · ratings · audit history — for data-heavy B2B.</text>

  <!-- Stack badge / pills row -->
  <g transform="translate(96 506)" font-size="16" font-weight="500">
    <!-- React 19 -->
    <g>
      <rect x="0" y="0" width="100" height="32" rx="6" fill="#FFFFFF" stroke="#E8E6DE"/>
      <text x="14" y="21" fill="#4A4A45">React 19</text>
    </g>
    <!-- TypeScript -->
    <g transform="translate(112 0)">
      <rect x="0" y="0" width="110" height="32" rx="6" fill="#FFFFFF" stroke="#E8E6DE"/>
      <text x="14" y="21" fill="#4A4A45">TypeScript</text>
    </g>
    <!-- Tailwind v4 -->
    <g transform="translate(234 0)">
      <rect x="0" y="0" width="124" height="32" rx="6" fill="#FFFFFF" stroke="#E8E6DE"/>
      <text x="14" y="21" fill="#4A4A45">Tailwind v4</text>
    </g>
    <!-- TanStack -->
    <g transform="translate(370 0)">
      <rect x="0" y="0" width="100" height="32" rx="6" fill="#FFFFFF" stroke="#E8E6DE"/>
      <text x="14" y="21" fill="#4A4A45">TanStack</text>
    </g>
    <!-- Recharts -->
    <g transform="translate(482 0)">
      <rect x="0" y="0" width="98" height="32" rx="6" fill="#FFFFFF" stroke="#E8E6DE"/>
      <text x="14" y="21" fill="#4A4A45">Recharts</text>
    </g>
  </g>

  <!-- Right-side visual: rating badges + risk pills -->
  <g transform="translate(820 220)">
    <!-- Rating badges, vertically stacked -->
    <g font-family="ui-monospace, 'JetBrains Mono', 'Menlo', monospace" font-weight="600">
      <!-- AAA -->
      <g>
        <rect x="0" y="0" width="180" height="56" rx="8" fill="#FFFFFF" stroke="#E8E6DE"/>
        <rect x="0" y="0" width="4" height="56" fill="#1F5C4E"/>
        <text x="22" y="36" font-size="22" fill="#1F5C4E">AAA</text>
        <text x="84" y="34" font-family="Inter, sans-serif" font-size="14" fill="#8A8A82" font-weight="400">Excellent</text>
      </g>
      <!-- A -->
      <g transform="translate(0 72)">
        <rect x="0" y="0" width="180" height="56" rx="8" fill="#FFFFFF" stroke="#E8E6DE"/>
        <rect x="0" y="0" width="4" height="56" fill="#4F8770"/>
        <text x="22" y="36" font-size="22" fill="#1F5C4E">A</text>
        <text x="84" y="34" font-family="Inter, sans-serif" font-size="14" fill="#8A8A82" font-weight="400">Good</text>
      </g>
      <!-- BB -->
      <g transform="translate(0 144)">
        <rect x="0" y="0" width="180" height="56" rx="8" fill="#FFFFFF" stroke="#E8E6DE"/>
        <rect x="0" y="0" width="4" height="56" fill="#C99846"/>
        <text x="22" y="36" font-size="22" fill="#1A1A17">BB</text>
        <text x="84" y="34" font-family="Inter, sans-serif" font-size="14" fill="#8A8A82" font-weight="400">Fair</text>
      </g>
      <!-- D -->
      <g transform="translate(0 216)">
        <rect x="0" y="0" width="180" height="56" rx="8" fill="#FFFFFF" stroke="#E8E6DE"/>
        <rect x="0" y="0" width="4" height="56" fill="#8E3B26"/>
        <text x="22" y="36" font-size="22" fill="#1A1A17">D</text>
        <text x="84" y="34" font-family="Inter, sans-serif" font-size="14" fill="#8A8A82" font-weight="400">Critical</text>
      </g>
    </g>
  </g>

  <!-- Bottom URL -->
  <text x="96" y="572" font-size="16" font-family="ui-monospace, 'JetBrains Mono', 'Menlo', monospace" fill="#8A8A82">chainscope-six.vercel.app</text>
</svg>
